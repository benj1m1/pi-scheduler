<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Pi Scheduler{% endblock %}</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    {% set current_path = request.url.path if request is defined else '' %}
    <a class="skip-link" href="#content">Skip to content</a>
    <header class="app-header">
      <a class="brand" href="/" {% if current_path == '/' %}aria-current="page"{% endif %}>Pi Scheduler</a>
      <nav aria-label="Primary">
        <a href="/jobs/new" {% if current_path == '/jobs/new' %}aria-current="page"{% endif %}>New Job</a>
        <a href="/groups/new" {% if current_path == '/groups/new' %}aria-current="page"{% endif %}>New Group</a>
        <a href="/logs" {% if current_path.startswith('/logs') or current_path.startswith('/runs/') %}aria-current="page"{% endif %}>Logs</a>
        <a href="/audit" {% if current_path.startswith('/audit') %}aria-current="page"{% endif %}>Audit</a>
        <a href="/cron" {% if current_path == '/cron' %}aria-current="page"{% endif %}>Cron Preview</a>
      </nav>
    </header>
    <main id="content">{% block content %}{% endblock %}</main>
  </body>
</html>
